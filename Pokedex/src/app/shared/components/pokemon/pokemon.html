<div class="api-container">
  <h2>Listado de Publicaciones</h2>

  @if (isLoading()) {
    <p>Cargando información desde la API...</p>
  } 
  
  @else {
    <ul class="posts-list">
      @for (post of posts(); track post.id) {
        <li>
          <h3>{{ post.title }}</h3>
          <p>{{ post.body }}</p>
        </li>
      } @empty {
        <p>No se encontraron publicaciones disponibles.</p>
      }
    </ul>
  }
</div>
